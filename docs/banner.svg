<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="ClauseLens — AI-Powered Contract Review">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Brand mark: stylised clause brackets -->
  <g transform="translate(80, 70)">
    <rect width="180" height="180" rx="24" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <path d="M 40 50 L 20 50 L 20 130 L 40 130"
          fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 140 50 L 160 50 L 160 130 L 140 130"
          fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="55" y1="80" x2="125" y2="80" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
    <line x1="55" y1="100" x2="125" y2="100" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
    <line x1="55" y1="120" x2="100" y2="120" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
  </g>

  <text x="320" y="135" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="68" font-weight="800" fill="#f8fafc" letter-spacing="-2">
    ClauseLens
  </text>

  <text x="320" y="180" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="500" fill="#cbd5e1">
    AI-Powered Contract Review
  </text>

  <text x="320" y="215" font-family="Inter, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="18" font-weight="400" fill="#94a3b8">
    Flag risky clauses  ·  Suggest grounded redlines  ·  Coordinate the workflow
  </text>

  <g transform="translate(320, 250)">
    <rect width="560" height="36" rx="6" fill="#0c4a6e"/>
    <text x="16" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="14" fill="#7dd3fc">$ docker compose up --build</text>
  </g>
</svg>
